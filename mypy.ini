[mypy]
python_version = 3.11
# Minimal, sensible baseline for the C1 gate: enforce Optional discipline without
# turning on full strict mode over a codebase that predates type-checking in CI.
strict_optional = True
# Third-party deps that ship no type stubs (pint, celery, boto3, pdfplumber, ...)
# must not fail the build.
ignore_missing_imports = True
# Keep the signal readable.
show_error_codes = True
warn_unused_ignores = False
