databases:
  - name: petrobrain-db
    plan: basic_256mb
    region: frankfurt
    postgresMajorVersion: "16"
    databaseName: petrobrain
    user: petrobrain
    ipAllowList: []

services:
  - type: web
    name: petrobrain-api
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    dockerCommand: sh -c "python -m app.db.pg && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: "8000"

      # --- Wire to managed Postgres ---
      - key: PB_DATABASE_URL
        fromDatabase:
          name: petrobrain-db
          property: connectionString
      - key: PB_PERSISTENCE_BACKEND
        value: postgres

      # --- App identity ---
      - key: PB_ENVIRONMENT
        value: prod
      - key: PB_OPERATIONAL_TIER
        value: "false"
      - key: PB_SOVEREIGN_REGION
        value: eu-central-1

      # --- LLM (Tier A, hosted Anthropic) ---
      - key: PB_LLM_PROVIDER
        value: anthropic
      - key: PB_LLM_MODEL
        value: claude-sonnet-4-6
      - key: PB_LLM_MAX_TOKENS
        value: "2048"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # --- Reranker (CPU-only, runs in the web dyno) ---
      - key: PB_RERANK_ENABLED
        value: "true"
      - key: PB_RERANK_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: PB_RERANK_CACHE_DIR
        value: /tmp/petrobrain-rerank

      # --- Object storage: in-memory for v1 (uploads do not persist between
      #     deploys). Swap to s3 + AWS/MinIO when needed. ---
      - key: PB_OBJECT_STORE_BACKEND
        value: memory

      # --- Redis / Celery: disabled. Jobs run inline. ---
      - key: PB_CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: PB_TOKEN_COST_REDIS_ENABLED
        value: "false"

      # --- Observability ---
      - key: PB_LOG_JSON
        value: "true"
      - key: PB_METRICS_ENABLED
        value: "true"

      # --- Auth ---
      - key: PB_JWT_SECRET
        generateValue: true
      - key: PB_JWT_ISSUER
        value: petrobrain
      - key: PB_JWT_AUDIENCE
        value: petrobrain-api

      # --- Web search (Tavily). Leave empty in dashboard to disable the tool. ---
      - key: PB_TAVILY_API_KEY
        sync: false

      # --- CORS: paste the Vercel domain after the first frontend deploy,
      #     e.g. https://petrobrain.vercel.app,https://petrobrain-admin.vercel.app ---
      - key: PB_CORS_ALLOW_ORIGINS
        sync: false
